services:
  grok2api-rs:
    image: ${IMAGE:-yuuzao/grok2api-rs:latest}
    container_name: grok2api-rs
    restart: unless-stopped
    pull_policy: always
    ports:
      - "${SERVER_PORT:-8000}:8000"
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      APP_URL: ${APP_URL:-http://127.0.0.1:${SERVER_PORT:-8000}}
      APP_KEY: ${APP_KEY:-grok2api}
      API_KEY: ${API_KEY:-}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - grok2api_data:/app/data

volumes:
  grok2api_data:
